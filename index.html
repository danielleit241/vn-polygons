<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bản đồ Tỉnh/Thành từ JSON</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
      :root {
        --panel-bg: rgba(255, 255, 255, 0.95);
        --panel-border: rgba(0, 0, 0, 0.08);
        --text-main: #1f2937;
        --text-muted: #4b5563;
        --accent: #007f5f;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text-main);
      }

      #map {
        height: 100vh;
        width: 100%;
      }

      .info-box {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 1000;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(4px);
        padding: 12px 14px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        max-width: 320px;
      }

      .info-box h1 {
        margin: 0 0 4px;
        font-size: 16px;
        line-height: 1.3;
      }

      .info-box p {
        margin: 0;
        color: var(--text-muted);
        font-size: 13px;
      }

      .status {
        margin-top: 8px;
        font-size: 12px;
        font-weight: 600;
        color: var(--accent);
      }

      .status.error {
        color: #b91c1c;
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .controls input {
        flex: 1;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .controls button {
        border: none;
        background: var(--accent);
        color: #fff;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        cursor: pointer;
      }

      .controls button:hover {
        filter: brightness(0.95);
      }

      @media (max-width: 640px) {
        .info-box {
          top: 10px;
          right: 10px;
          left: 10px;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="info-box">
      <h1>Bản đồ Tỉnh/Thành</h1>
      <p>Nhập mã file JSON trong thư mục sql/provinces để vẽ polygon.</p>
      <form id="provinceForm" class="controls">
        <input
          id="provinceCode"
          type="text"
          value="tp_ho_chi_minh"
          placeholder="Ví dụ: tp_ho_chi_minh"
        />
        <button type="submit">Vẽ</button>
      </form>
      <div id="status" class="status">Đang tải dữ liệu...</div>
    </div>

    <div id="map"></div>

    <script>
      const map = L.map("map", {
        zoomControl: true,
      }).setView([10.7769, 106.7009], 10);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      const formEl = document.getElementById("provinceForm");
      const codeInputEl = document.getElementById("provinceCode");
      const statusEl = document.getElementById("status");
      let currentLayer = null;

      function normalizeCode(rawCode) {
        return String(rawCode || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "_");
      }

      function readNameFromGeojson(geojson, fallbackCode) {
        const firstFeature = geojson?.features?.[0];
        return firstFeature?.properties?.province_name || fallbackCode;
      }

      function drawProvinceByCode(rawCode) {
        const code = normalizeCode(rawCode);
        if (!code) {
          statusEl.textContent = "Vui lòng nhập mã file JSON";
          statusEl.classList.add("error");
          return;
        }

        statusEl.textContent = `Đang tải ${code}.json ...`;
        statusEl.classList.remove("error");

        fetch(`./sql/provinces/${encodeURIComponent(code)}.json`)
          .then((response) => {
            if (!response.ok) {
              throw new Error(
                `Không tìm thấy file ${code}.json (HTTP ${response.status})`,
              );
            }
            return response.json();
          })
          .then((geojson) => {
            if (currentLayer) {
              map.removeLayer(currentLayer);
            }

            currentLayer = L.geoJSON(geojson, {
              style: function () {
                return {
                  fillColor: "#2fbf71",
                  color: "#1f8a4c",
                  weight: 2,
                  opacity: 0.95,
                  fillOpacity: 0.28,
                };
              },
              onEachFeature: function (feature, layer) {
                const name = feature?.properties?.province_name || code;
                layer.bindPopup(`<b>${name}</b>`);
              },
            }).addTo(map);

            const bounds = currentLayer.getBounds();
            if (bounds.isValid()) {
              map.fitBounds(bounds, { padding: [20, 20] });
            }

            const titleName = readNameFromGeojson(geojson, code);
            statusEl.textContent = `Đã hiển thị: ${titleName}`;
            document.title = `Bản đồ ${titleName}`;
            history.replaceState(null, "", `?code=${encodeURIComponent(code)}`);
          })
          .catch((error) => {
            statusEl.textContent = `Lỗi: ${error.message}`;
            statusEl.classList.add("error");
          });
      }

      formEl.addEventListener("submit", function (event) {
        event.preventDefault();
        drawProvinceByCode(codeInputEl.value);
      });

      const initialCode =
        new URLSearchParams(window.location.search).get("code") ||
        codeInputEl.value;
      codeInputEl.value = initialCode;
      drawProvinceByCode(initialCode);
    </script>
  </body>
</html>
